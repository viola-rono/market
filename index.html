<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SokoMtaani - Kenya's Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Custom Scrollbar for horizontal galleries */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } }
        .animate-pulse-green { animation: pulse-green 2s infinite; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Tier Gradients */
        .tier-bronze { background: linear-gradient(135deg, #cd7f32, #e6ac6e); }
        .tier-silver { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); }
        .tier-gold { background: linear-gradient(135deg, #ffd700, #ffec8b); }
        .tier-platinum { background: linear-gradient(135deg, #e5e4e2, #f0f0f0); color: #333; }
        .tier-diamond { background: linear-gradient(135deg, #b9f2ff, #00bfff); }

        /* Loader */
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #10b981; width: 24px; height: 24px; -webkit-animation: spin 1s linear infinite; /* Safari */ animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .carousel-dot { transition: transform 0.2s, background-color 0.2s; }
        .carousel-dot.active { background-color: #10b981; transform: scale(1.15); }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- App Container -->
    <div id="app" class="min-h-screen flex flex-col relative pb-20">
        
        <!-- Header -->
        <header class="sticky top-0 z-50 glass-panel shadow-sm px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="router.navigate('home')">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-white animate-pulse-green">
                    <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl leading-none text-emerald-700">SokoMtaani</h1>
                    <span class="text-xs text-slate-500 font-medium">Kenya's Marketplace</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button type="button" onclick="router.navigate('notifications')" class="relative p-2 hover:bg-slate-100 rounded-full transition" title="Notifications">
                    <i data-lucide="bell" class="w-6 h-6 text-slate-600"></i>
                    <span id="notif-badge" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full hidden"></span>
                </button>
                <button type="button" onclick="router.navigate('inbox')" class="relative p-2 hover:bg-slate-100 rounded-full transition" title="Messages">
                    <i data-lucide="message-square" class="w-6 h-6 text-slate-600"></i>
                </button>
                <button onclick="toggleMenu()" class="p-2 hover:bg-slate-100 rounded-full transition">
                    <i data-lucide="menu" class="w-6 h-6 text-slate-600"></i>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 p-4 max-w-5xl mx-auto w-full">
            <!-- Content injected via JS -->
        </main>

        <!-- Bottom Nav (Mobile) -->
        <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 px-6 py-3 flex justify-between items-center z-40 md:hidden">
            <button onclick="router.navigate('home')" class="flex flex-col items-center gap-1 text-emerald-600">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">Home</span>
            </button>
            <button onclick="router.navigate('favorites')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600">
                <i data-lucide="heart" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">Saved</span>
            </button>
            <button onclick="handleSellClick()" class="flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600">
                <div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center text-white -mt-8 shadow-lg border-4 border-white">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </div>
            </button>
            <button onclick="router.navigate('dashboard')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">My Shop</span>
            </button>
            <button onclick="router.navigate('settings')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-emerald-600">
                <i data-lucide="settings" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">Settings</span>
            </button>
        </nav>

        <!-- Modals Container -->
        <div id="modal-container" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
            <!-- Modals injected here -->
        </div>

        <!-- Toast Container -->
        <div id="toast-container" class="fixed top-20 right-4 z-[70] flex flex-col gap-2 pointer-events-none"></div>
    </div>

    <script>
        // --- Supabase (public client — keep service role keys off the client) ---
        const SUPABASE_URL = 'https://ybhhowwxnnpdcwekoujr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_MD2yG0Hqg45aoxt8ujlKDQ_O05K-6Go';
        const SUPABASE_PROJECT_REF = 'ybhhowwxnnpdcwekoujr';
        const EDGE_PESAPAL_SUBMIT = SUPABASE_URL + '/functions/v1/pesapal-submit-order';
        const EDGE_BAN_CURRENT_USER = SUPABASE_URL + '/functions/v1/ban-current-user';

        let supabaseClient = null;
        function getSupabase() {
            const mod = window.supabase;
            const createClient = mod && (typeof mod.createClient === 'function' ? mod.createClient : mod.default?.createClient);
            if (!createClient || !SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
            if (!supabaseClient) {
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
                });
            }
            return supabaseClient;
        }

        // --- State Management ---
        const store = {
            user: null, // { id, name, email, avatar, tier, isVerified, isBanned, warnings, country, phone, acceptedTermsAt, termsVersion }
            products: [],
            chats: [],
            favorites: new Set(),
            sellerLikes: {}, // sellerId -> Set of user ids (string)
            profileViews: {}, // sellerId -> count
            notifications: [], // { id, title, body, read, at, route? }
            verification: { status: 'none', steps: { email: false, phone: false, idUpload: false, liveness: false }, submittedAt: null },
            countriesCache: null,
            currentView: 'home',
            filters: { category: 'All', search: '' },
            pagination: { page: 1, limit: 10, hasMore: true },
            
            loadFavorites() {
                try {
                    const raw = localStorage.getItem('soko_favorites');
                    if (raw) this.favorites = new Set(JSON.parse(raw).map(Number));
                } catch (e) { this.favorites = new Set(); }
            },
            saveFavorites() {
                localStorage.setItem('soko_favorites', JSON.stringify([...this.favorites]));
            },
            loadNotifications() {
                try {
                    const raw = localStorage.getItem('soko_notifications');
                    this.notifications = raw ? JSON.parse(raw) : [];
                } catch (e) { this.notifications = []; }
            },
            saveNotifications() {
                localStorage.setItem('soko_notifications', JSON.stringify(this.notifications.slice(0, 100)));
            },
            pushNotification(title, body, route = null) {
                this.notifications.unshift({
                    id: 'n_' + Date.now(),
                    title,
                    body,
                    read: false,
                    at: new Date().toISOString(),
                    route
                });
                this.saveNotifications();
                if (typeof updateNotifBadge === 'function') updateNotifBadge();
            },
            loadSellerSocial() {
                try {
                    const likes = localStorage.getItem('soko_seller_likes');
                    if (likes) {
                        const o = JSON.parse(likes);
                        this.sellerLikes = Object.fromEntries(Object.entries(o).map(([k, v]) => [k, new Set(v)]));
                    }
                    const pv = localStorage.getItem('soko_profile_views');
                    this.profileViews = pv ? JSON.parse(pv) : {};
                } catch (e) {
                    this.sellerLikes = {};
                    this.profileViews = {};
                }
            },
            saveSellerSocial() {
                const o = Object.fromEntries(Object.entries(this.sellerLikes).map(([k, v]) => [k, [...v]]));
                localStorage.setItem('soko_seller_likes', JSON.stringify(o));
                localStorage.setItem('soko_profile_views', JSON.stringify(this.profileViews));
            },
            // Mock Data Generators
            init() {
                this.loadFavorites();
                this.loadNotifications();
                this.loadSellerSocial();
                // Create mock user if none exists (guest — sign-in optional on public pages)
                if (!localStorage.getItem('soko_user')) {
                    this.user = {
                        id: 'usr_' + Math.random().toString(36).substr(2, 9),
                        name: 'Guest User',
                        email: null,
                        avatar: null,
                        tier: 'Free',
                        isVerified: false,
                        isBanned: false,
                        warnings: 0,
                        country: 'Kenya',
                        phone: null,
                        views: 0,
                        productsCount: 0,
                        joined: new Date().toISOString(),
                        acceptedTermsAt: null,
                        termsVersion: null
                    };
                } else {
                    this.user = JSON.parse(localStorage.getItem('soko_user'));
                }
                try {
                    const v = localStorage.getItem('soko_verification');
                    if (v) this.verification = JSON.parse(v);
                } catch (e) {}

                // Mock Products
                this.products = [
                    {
                        id: 1,
                        title: 'Vintage Film Camera',
                        price: 15000,
                        currency: 'KES',
                        condition: 'Good',
                        location: 'Nairobi, Westlands',
                        category: 'Electronics',
                        images: ['https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&w=500&q=80'],
                        sellerId: 'usr_123',
                        sellerName: 'Tech Haven',
                        sellerAvatar: 'https://i.pravatar.cc/150?u=1',
                        isVerified: true,
                        isBoosted: true,
                        tier: 'Gold',
                        views: 124,
                        likes: 12,
                        status: 'active', // active, pending, banned
                        description: 'Classic 35mm camera in working condition. Comes with leather case.',
                        reviews: [
                            { id: 'r1', userId: 'u_alice', user: 'Alice', rating: 5, text: 'Great seller, fast shipping!', date: '2023-10-01', replies: [{ user: 'Tech Haven', text: 'Thank you — glad it arrived safely!', date: '2023-10-02', isSeller: true }] }
                        ]
                    },
                    {
                        id: 2,
                        title: 'Handcrafted Leather Sofa',
                        price: 45000,
                        currency: 'KES',
                        condition: 'Like New',
                        location: 'Mombasa',
                        category: 'Furniture',
                        images: [
                            'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=500&q=80',
                            'https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?auto=format&fit=crop&w=500&q=80',
                            'https://images.unsplash.com/photo-1484101403633-562f891dc89a?auto=format&fit=crop&w=500&q=80'
                        ],
                        sellerId: 'usr_456',
                        sellerName: 'Furniture Plus',
                        sellerAvatar: 'https://i.pravatar.cc/150?u=2',
                        isVerified: false,
                        isBoosted: false,
                        tier: 'Free',
                        views: 45,
                        likes: 5,
                        status: 'active',
                        description: 'Comfortable 3-seater sofa, barely used. Moving out sale.',
                        reviews: []
                    },
                    {
                        id: 3,
                        title: 'Nike Air Force 1',
                        price: 8000,
                        currency: 'KES',
                        condition: 'New',
                        location: 'Kisumu',
                        category: 'Fashion',
                        images: ['https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&w=500&q=80'],
                        sellerId: 'usr_789',
                        sellerName: 'Sneaker Head',
                        sellerAvatar: 'https://i.pravatar.cc/150?u=3',
                        isVerified: true,
                        isBoosted: true,
                        tier: 'Silver',
                        views: 340,
                        likes: 56,
                        status: 'active',
                        description: 'Original box included. Size 10 US.',
                        reviews: []
                    }
                ];
                this.loadPersistedProducts();
            },

            saveUser() {
                localStorage.setItem('soko_user', JSON.stringify(this.user));
            },
            saveVerification() {
                localStorage.setItem('soko_verification', JSON.stringify(this.verification));
            },
            persistProducts() {
                localStorage.setItem('soko_products', JSON.stringify(this.products));
            },
            loadPersistedProducts() {
                try {
                    const raw = localStorage.getItem('soko_products');
                    if (raw && JSON.parse(raw).length) this.products = JSON.parse(raw);
                } catch (e) {}
            }
        };

        // --- Router ---
        const router = {
            routes: {
                'home': () => views.renderHome(),
                'product': (id) => views.renderProductDetail(id),
                'dashboard': () => views.renderDashboard(),
                'add-product': () => views.renderAddProduct(),
                'edit-product': (id) => views.renderEditProduct(id),
                'inbox': () => views.renderInbox(),
                'chat': (id) => views.renderChat(id),
                'favorites': () => views.renderFavorites(),
                'settings': () => views.renderSettings(),
                'tiers': () => views.renderTiers(),
                'profile': (id) => views.renderPublicProfile(id),
                'appeal': () => views.renderAppealForm(),
                'support': () => views.renderSupport(),
                'analytics': () => views.renderAnalytics(),
                'boost': () => views.renderBoostManager(),
                'notifications': () => views.renderNotificationsCenter()
            },
            navigate(route, param = null) {
                window.scrollTo(0, 0);
                store.currentView = route;
                const viewFunc = this.routes[route];
                if (viewFunc) {
                    document.getElementById('main-content').innerHTML = viewFunc(param);
                    lucide.createIcons();
                    this.updateNavState();
                    if (typeof updateNotifBadge === 'function') updateNotifBadge();

                    if (route === 'home') views.initHome();
                    if (route === 'dashboard') views.initDashboard();
                    if (route === 'product' && param != null) views.initProductDetail(param);
                }
            },
            updateNavState() {
                document.querySelectorAll('[data-nav-route]').forEach((el) => {
                    const r = el.getAttribute('data-nav-route');
                    el.classList.toggle('text-emerald-600', r === store.currentView);
                    el.classList.toggle('text-slate-400', r !== store.currentView);
                });
            }
        };

        // --- Views (Rendering Logic) ---
        const views = {
            // 1. HOME VIEW
            renderHome() {
                const q = (store.filters.search || '').trim().toLowerCase();
                const filtered = store.products.filter(p => {
                    if (p.status !== 'active') return false;
                    if (store.filters.category !== 'All' && p.category !== store.filters.category) return false;
                    if (!q) return true;
                    const blob = `${p.title} ${p.description} ${p.location} ${p.sellerName} ${p.category}`.toLowerCase();
                    return blob.includes(q);
                });
                const guestDismissed = localStorage.getItem('soko_guest_banner_dismiss') === '1';
                const showGuest = !guestDismissed && (!store.user || !store.user.email);

                let html = `
                    ${showGuest ? `
                    <div class="mb-4 p-4 rounded-xl bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-100 flex flex-col sm:flex-row sm:items-center gap-3 animate-fade-in">
                        <div class="flex-1 text-sm text-slate-700">
                            <span class="font-semibold text-emerald-800">Browse as a guest</span> — sign in with Google or email anytime for selling, inbox, and synced saves.
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button type="button" onclick="modals.open('auth')" class="px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-semibold hover:bg-emerald-700">Sign in</button>
                            <button type="button" onclick="localStorage.setItem('soko_guest_banner_dismiss','1'); router.navigate('home')" class="px-3 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm hover:bg-white">Dismiss</button>
                        </div>
                    </div>` : ''}
                    <div class="mb-6 animate-fade-in">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                            <input type="search" id="search-input" placeholder="Search title, seller, location, category..." value="${(store.filters.search || '').replace(/"/g, '&quot;')}"
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 shadow-sm"
                                oninput="handlers.search(this.value)" autocomplete="off">
                        </div>
                        <div class="flex gap-2 mt-4 overflow-x-auto hide-scroll pb-2">
                            ${['All', 'Electronics', 'Fashion', 'Furniture', 'Cars', 'Property'].map(c => 
                                `<button onclick="handlers.filterCategory('${c}')" class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap ${store.filters.category === c ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600 border border-slate-200'}">${c}</button>`
                            ).join('')}
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-slate-800">Latest Products</h2>
                        <span class="text-sm text-slate-500">${filtered.length} items</span>
                    </div>

                    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 pb-20">
                        ${filtered.map(p => components.productCard(p)).join('')}
                    </div>
                    
                    <div id="loading-trigger" class="h-10 w-full flex justify-center items-center mt-4">
                        <!-- Lazy loading trigger -->
                    </div>
                `;
                return html;
            },

            initHome() {
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting && store.pagination.hasMore) {
                        setTimeout(() => {}, 1000);
                    }
                });
                const trig = document.getElementById('loading-trigger');
                if (trig) observer.observe(trig);
            },

            initProductDetail(id) {
                const gal = document.getElementById('product-image-gallery');
                const dots = document.querySelectorAll('.carousel-dot');
                if (!gal || !dots.length) return;
                gal.addEventListener('scroll', () => {
                    const w = gal.clientWidth || 1;
                    const i = Math.round(gal.scrollLeft / w);
                    dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
                });
            },

            // 2. PRODUCT DETAIL VIEW
            renderProductDetail(id) {
                const p = store.products.find(x => x.id == id);
                if (!p) return `<div class="p-10 text-center">Product not found</div>`;

                const isFav = store.favorites.has(p.id);
                const isOwner = store.user && store.user.id === p.sellerId;
                p.views = (p.views || 0) + 1;
                store.persistProducts();

                const imgCount = (p.images && p.images.length) ? p.images.length : 1;

                return `
                    <div class="animate-fade-in max-w-2xl mx-auto bg-white rounded-2xl shadow-sm overflow-hidden">
                        <!-- Image Gallery (horizontal swipe) -->
                        <div class="relative">
                        <div id="product-image-gallery" class="relative h-64 md:h-96 bg-slate-100 overflow-x-auto flex snap-x snap-mandatory hide-scroll scroll-smooth">
                            ${p.images.map(img => `
                                <div class="min-w-full h-full snap-center shrink-0 relative">
                                    <img src="${img}" alt="" class="w-full h-full object-cover pointer-events-none select-none">
                                </div>
                            `).join('')}
                            <div class="absolute top-4 right-4 flex gap-2 z-10">
                                <button type="button" onclick="event.stopPropagation(); handlers.toggleFav(${p.id})" class="p-2 bg-white/80 backdrop-blur rounded-full shadow-sm hover:bg-white">
                                    <i data-lucide="heart" class="w-5 h-5 ${isFav ? 'fill-red-500 text-red-500' : 'text-slate-600'}"></i>
                                </button>
                                <button type="button" onclick="event.stopPropagation(); handlers.reportProduct(${p.id})" class="p-2 bg-white/80 backdrop-blur rounded-full shadow-sm hover:bg-white" title="Report listing">
                                    <i data-lucide="flag" class="w-5 h-5 text-slate-600"></i>
                                </button>
                            </div>
                            ${p.isBoosted ? `<div class="absolute top-4 left-4 z-10 bg-gradient-to-r from-amber-400 to-orange-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-sm flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> SPONSORED</div>` : ''}
                        </div>
                        ${imgCount > 1 ? `
                        <div class="flex justify-center gap-1.5 py-2 bg-slate-50 border-b border-slate-100">
                            ${p.images.map((_, i) => `<button type="button" aria-label="Slide ${i + 1}" class="carousel-dot w-2 h-2 rounded-full bg-slate-300 ${i === 0 ? 'active' : ''}" onclick="handlers.scrollGallery(${i})"></button>`).join('')}
                        </div>
                        <p class="text-center text-[10px] text-slate-400 px-2 pb-1">Swipe sideways to see all ${imgCount} photos</p>` : ''}
                        </div>

                        <div class="p-5">
                            <div class="flex justify-between items-start mb-2">
                                <h1 class="text-2xl font-bold text-slate-900">${p.title}</h1>
                                <span class="text-2xl font-bold text-emerald-600">${p.currency} ${p.price.toLocaleString()}</span>
                            </div>
                            
                            <div class="flex items-center gap-2 text-sm text-slate-500 mb-4">
                                <span class="bg-slate-100 px-2 py-1 rounded text-xs font-medium text-slate-700">${p.condition}</span>
                                <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${p.location}</span>
                                <span class="flex items-center gap-1"><i data-lucide="eye" class="w-3 h-3"></i> ${p.views} views</span>
                            </div>

                            <!-- Seller Mini-Profile -->
                            <div role="button" tabindex="0" onclick="router.navigate('profile', '${p.sellerId}')" onkeydown="if(event.key==='Enter')router.navigate('profile','${p.sellerId}')" class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl mb-4 cursor-pointer hover:bg-slate-100 transition">
                                <img src="${p.sellerAvatar}" alt="" class="w-12 h-12 rounded-full object-cover border border-slate-200">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2">
                                        <h3 class="font-bold text-slate-800">${p.sellerName}</h3>
                                        ${p.isVerified ? `<i data-lucide="badge-check" class="w-4 h-4 text-blue-500 fill-blue-100"></i>` : ''}

                const likedSet = store.sellerLikes[sellerId] || new Set();

                                    <div class="flex gap-2">

            // Helpers
            getTierColor(tier) {
                const map = {
                    'Bronze': 'bg-orange-100 text-orange-800',
                    'Silver': 'bg-slate-200 text-slate-800',
                    'Gold': 'bg-yellow-100 text-yellow-800',
                    'Platinum': 'bg-gray-200 text-gray-800',
                    'Diamond': 'bg-blue-100 text-blue-800'

                return map[tier] || 'bg-slate-100 text-slate-600';

        const components = {
            productCard(p) {
                const isFav = store.favorites.has(p.id);

            search(val) {

                                </details>
                                <details class="rounded-xl border border-slate-100 p-3 bg-slate-50">
                                    <summary class="font-semibold cursor-pointer text-slate-800">6. Privacy &amp; data</summary>
                                    <p class="mt-2 text-xs leading-relaxed"><strong>Legal:</strong> Our processing includes security, analytics, and legal compliance.</p>
                                    <p class="mt-1 text-xs leading-relaxed"><strong>Explained:</strong> Public profile fields (name, shop, ratings) are visible to buyers. DMs are stored to investigate abuse reports.</p>
                                </details>
                                <details class="rounded-xl border border-slate-100 p-3 bg-slate-50">
                                    <summary class="font-semibold cursor-pointer text-slate-800">7. Enforcement &amp; appeals</summary>
                                    <p class="mt-2 text-xs leading-relaxed"><strong>Legal:</strong> We may suspend accounts, withhold payouts during review, and cooperate with authorities.</p>
                                    <p class="mt-1 text-xs leading-relaxed"><strong>Explained:</strong> Use the appeal flow if you believe a mistake was made. Automated systems may flag risk before humans review.</p>
                                </details>
                            </div>
                            <label class="flex items-start gap-2 mt-4 text-sm text-slate-700">
                                <input id="terms-accept" type="checkbox" class="mt-1 rounded text-emerald-600">
                                <span>I have read these terms and agree to be bound by the latest version shown here.</span>
                            </label>
                            <button type="button" onclick="handlers.acceptTerms()" class="mt-4 w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Save acceptance</button>
                        </div>
                    `;
                } else if (type === 'verification') {
                    content = `
                        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6 animate-fade-in">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-xl font-bold">Seller verification</h3>
                                <span class="text-[10px] uppercase font-bold text-slate-400">Advanced</span>
                            </div>
                            <ol class="text-xs text-slate-500 space-y-3 mb-4 list-decimal list-inside">
                                <li><strong class="text-slate-700">Email &amp; phone</strong> — confirm codes (simulated below).</li>
                                <li><strong class="text-slate-700">Government ID</strong> — upload clear photo; blur sensitive numbers if your jurisdiction allows.</li>
                                <li><strong class="text-slate-700">Selfie liveness</strong> — short video or live capture to match ID.</li>
                                <li><strong class="text-slate-700">Business docs</strong> (optional) — registration or tax PIN for store badges.</li>
                            </ol>
                            <div class="space-y-3 text-sm">
                                <button type="button" onclick="handlers.verificationMark('email')" class="w-full py-2 rounded-xl border ${store.verification.steps.email ? 'border-emerald-300 bg-emerald-50 text-emerald-800' : 'border-slate-200 hover:bg-slate-50'}">Step1 · Confirm email (demo)</button>
                                <button type="button" onclick="handlers.verificationMark('phone')" class="w-full py-2 rounded-xl border ${store.verification.steps.phone ? 'border-emerald-300 bg-emerald-50 text-emerald-800' : 'border-slate-200 hover:bg-slate-50'}">Step 2 · Confirm phone (demo)</button>
                                <button type="button" onclick="handlers.verificationMark('idUpload')" class="w-full py-2 rounded-xl border ${store.verification.steps.idUpload ? 'border-emerald-300 bg-emerald-50 text-emerald-800' : 'border-slate-200 hover:bg-slate-50'}">Step 3 · Upload ID (demo)</button>
                                <button type="button" onclick="handlers.verificationMark('liveness')" class="w-full py-2 rounded-xl border ${store.verification.steps.liveness ? 'border-emerald-300 bg-emerald-50 text-emerald-800' : 'border-slate-200 hover:bg-slate-50'}">Step 4 · Liveness check (demo)</button>
                            </div>
                            <button type="button" onclick="handlers.verificationSubmit()" class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Submit for manual review</button>
                            <p class="text-[10px] text-slate-400 mt-2">Production: connect each step to Supabase Storage + Edge Functions with audit logging.</p>
                        </div>
                    `;
                } else if (type === 'profileSetup') {
                    content = `
                        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6 animate-fade-in">
                             <h3 class="text-xl font-bold mb-4">Edit profile</h3>
                             <form onsubmit="handlers.saveProfileSetup(event)" class="space-y-3">
                                <input name="name" type="text" placeholder="Full name" value="${(store.user?.name || '').replace(/"/g, '&quot;')}" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200" required>
                                <input name="phone" type="tel" placeholder="Phone number" value="${(store.user?.phone || '').replace(/"/g, '&quot;')}" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200">
                                <label class="block text-xs font-medium text-slate-600">Country / region</label>
                                <select id="country-select" name="country" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 text-slate-700"></select>
                                <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Save changes</button>
                             </form>
                        </div>
                    `;
                }

                container.innerHTML = content;
                container.classList.remove('hidden');
                lucide.createIcons();
                if (type === 'profileSetup') populateCountrySelect('country-select');
            },
            close() {
                document.getElementById('modal-container').classList.add('hidden');
            }
        };

        // --- Toast System ---
        const toast = {
            show(msg, type = 'info') {
                const container = document.getElementById('toast-container');
                const el = document.createElement('div');
                const colors = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-500' : 'bg-slate-800';
                
                el.className = `${colors} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 min-w-[250px] animate-fade-in pointer-events-auto`;
                el.innerHTML = `
                    <i data-lucide="${type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'}" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">${msg}</span>
                `;
                
                container.appendChild(el);
                lucide.createIcons();
                
                setTimeout(() => {
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(-10px)';
                    setTimeout(() => el.remove(), 300);
                }, 3000);
            }
        };

        // --- Global Helpers ---
        function toggleMenu() {
            // Simple mobile menu toggle logic could go here
            // For now, let's just navigate to settings or dashboard
            router.navigate('settings');
        }

        function handleSellClick() {
            if (!store.user || !store.user.email || store.user.isBanned) {
                modals.open('auth');
            } else {
                router.navigate('add-product');
            }
        }

        function updateNotifBadge() {
            const el = document.getElementById('notif-badge');
            if (!el) return;
            const n = store.notifications.filter(x => !x.read).length;
            el.classList.toggle('hidden', n === 0);
        }

        async function populateCountrySelect(selectId) {
            const sel = document.getElementById(selectId);
            if (!sel) return;
            sel.innerHTML = '<option value="">Loading countries…</option>';
            try {
                if (!store.countriesCache) {
                    const res = await fetch('https://restcountries.com/v3.1/all?fields=name,cca2');
                    if (!res.ok) throw new Error('fetch');
                    const data = await res.json();
                    store.countriesCache = data
                        .map(c => c.name?.common)
                        .filter(Boolean)
                        .sort((a, b) => a.localeCompare(b));
                }
                const current = store.user?.country || '';
                sel.innerHTML = store.countriesCache.map(name => `
                    <option value="${name.replace(/"/g, '&quot;')}" ${name === current ? 'selected' : ''}>${name}</option>
                `).join('');
            } catch (e) {
                const fallback = ['Kenya', 'Uganda', 'Tanzania', 'Rwanda', 'Nigeria', 'South Africa', 'India', 'United Kingdom', 'United States', 'Canada', 'Australia', 'Germany', 'France', 'China', 'Brazil', 'Japan'];
                sel.innerHTML = fallback.map(name => `<option value="${name}" ${name === (store.user?.country) ? 'selected' : ''}>${name}</option>`).join('');
            }
        }

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', async () => {
            store.init();
            const sb = getSupabase();
            if (sb) {
                try {
                    const { data: { session } } = await sb.auth.getSession();
                    if (session?.user) await handlers.applySessionUser(session);
                    sb.auth.onAuthStateChange((_event, session) => {
                        if (session?.user) handlers.applySessionUser(session);
                    });
                } catch (e) {
                    console.warn('Supabase session', e);
                }
            }
            updateNotifBadge();
            router.navigate('home');
        });

    </script>
</body>
</html>
